services:
  db:
    image: postgres:16-alpine
    container_name: mentalhealth-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mentalhealth
    ports:
      - "5432:5432"
    volumes:
      - mentalhealth-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mentalhealth"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mentalhealth-pgdata:
